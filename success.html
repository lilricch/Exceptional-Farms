<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - Exceptional Farms</title>
    <link rel="stylesheet" href="Assets/success.css">
    <style>
        header .logo {
            height: 120px;
            width: auto;
            object-fit: contain;
            background: white;
            padding: 5px;
            border-radius: 5px;
        }
        @media (max-width: 768px) {
            header .logo {
                height: 95px;
            }
        }
        @media (max-width: 576px) {
            header .logo {
                height: 85px;
            }
        }
        /* Responsive Container Styles */
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #f4f9f4;
        }
        .success-container {
            width: 90%;
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }
        .success-container h1 {
            font-size: 24px;
            color: #1b5e20;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #1b5e20;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
    </style>
</head>
<body>

<header class="header">
    <a href="index.html"><img src="Assets/logo.jpg" alt="Exceptional Farms Logo" class="logo"></a>
</header>

<div class="success-container">

    <div class="icon-box">
        <div class="checkmark">✔</div>
    </div>

    <h1>Payment Successful!</h1>

    <p class="msg">Thank you for your purchase. Your payment was completed successfully.</p>

    <p class="ref">
        <strong>Payment Reference:</strong> 
        <span id="pay-ref">Loading...</span>
    </p>

    <a href="products.html" class="btn">Continue Shopping</a>

</div>

<footer>
    © 2026 Exceptional Farms
    <div class="legal-links">
        <a href="privacy.html">Privacy Policy</a> |
        <a href="terms.html">Terms &amp; Conditions</a> |
        <a href="disclaimer.html">Disclaimer</a> |
        <a href="return.html">Return Policy</a> |
        <a href="shipping.html">Shipping Policy</a>
    </div>
</footer>

<script>
    let urlParams = new URLSearchParams(window.location.search);
    let reference = urlParams.get("ref");

    document.getElementById("pay-ref").textContent = reference || "Unavailable";
</script>

</body>
</html>
