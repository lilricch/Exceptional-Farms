<script>

function generateProductGrid() {
    const grid = document.querySelector('.product-grid');
    if (!grid) return;

    // Clear any existing static content
    grid.innerHTML = '';

    // Loop through products and create HTML for each
    products.forEach(product => {
        const itemHTML = `
            <div class="product-item" data-category="${product.category}" onclick="location.href='product-view.html?id=${product.id}'">
                <div class="product-image">
                    <img src="${product.image}" alt="${product.name}" loading="lazy">
                </div>
                <div class="product-details">
                    <h2>${product.name}</h2>
                    <span class="price">GH₵ ${product.price.toFixed(2)}</span>
                    <button class="add-to-cart" data-name="${product.name}" data-price="${product.price}">Add to Cart</button>
                </div>
            </div>
        `;
        grid.insertAdjacentHTML('beforeend', itemHTML);
    });
}

function toggleMenu() {
    document.querySelector("nav").classList.toggle("show");
}


const categoryBar = document.querySelector(".category-bar");
const subcategoryBar = document.querySelector(".subcategory-bar");

if (categoryBar && subcategoryBar) {
    categoryBar.addEventListener("mouseenter", () => {
        subcategoryBar.style.display = "flex";
    });
    
    categoryBar.addEventListener("mouseleave", () => {
        if (!subcategoryBar.matches(":hover")) {
            subcategoryBar.style.display = "none";
        }
    });
    
    subcategoryBar.addEventListener("mouseenter", () => {
        subcategoryBar.style.display = "flex";
    });
    
    subcategoryBar.addEventListener("mouseleave", () => {
        subcategoryBar.style.display = "none";
    });
}


function filterProducts() {
    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get("category");
    const searchTerm = document.getElementById('search-bar').value.toLowerCase().trim();
    const equipmentSubCats = ['feeders', 'drinkers', 'others'];

    document.querySelectorAll(".product-grid .product-item").forEach(item => {
        const itemCat = item.dataset.category;
        const itemName = item.querySelector('h2').textContent.toLowerCase();

        // Determine if the item matches the category filter
        let categoryMatch = false;
        if (!category) {
            categoryMatch = true; // No category selected, show all
        } else if (category === 'equipment') {
            categoryMatch = equipmentSubCats.includes(itemCat); // 'equipment' is a group
        } else {
            categoryMatch = (itemCat === category); // Direct match for sub-categories
        }

        // Determine if the item matches the search filter
        const searchMatch = itemName.includes(searchTerm);

        // Show or hide the item
        if (categoryMatch && searchMatch) {
            item.style.display = "block";
        } else {
            item.style.display = "none";
        }
    });
}



function showNotification(message) {
    
    const existing = document.querySelector(".notification");
    if (existing) existing.remove();
    
   
    const notification = document.createElement("div");
    notification.className = "notification";
    notification.innerHTML = "✓ " + message;
    document.body.appendChild(notification);
    
    
    setTimeout(() => {
        notification.remove();
    }, 3000);
}

function setupEventListeners() {
    // Add to cart buttons
    document.querySelectorAll(".add-to-cart").forEach(btn => {
        btn.addEventListener("click", (e) => {
            e.stopPropagation(); // Prevent the parent onclick from firing

            let name = btn.dataset.name;
            let price = Number(btn.dataset.price);
            const product = products.find(p => p.name === name);
            const image = product ? product.image : '';

            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let existingItem = cart.find(item => item.name === name);

            if (existingItem) {
                existingItem.qty = (existingItem.qty || 1) + 1;
            } else {
                cart.push({ name: name, price: price, qty: 1, image: image });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            showNotification(`${name} added to cart!`);
        });
    });

    // Search bar
    document.getElementById('search-bar').addEventListener('input', filterProducts);
}

// Main execution on page load
document.addEventListener('DOMContentLoaded', () => {
    generateProductGrid();
    filterProducts(); // Initial filter
    setupEventListeners();
});
</script>
